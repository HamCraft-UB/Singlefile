<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Neon Cosmos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --neon-pink: #ff2a85;
            --dark-pink: #8a1042;
            --bg-dark: #0f050d;
            --text-light: #fbe6ef;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--dark-pink) 0%, var(--bg-dark) 80%);
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle starry background effect */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 100px 100px;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            margin: 0;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 3px var(--neon-pink);
            text-shadow: 
                0 0 10px rgba(255, 42, 133, 0.3), 
                0 0 20px rgba(255, 42, 133, 0.3), 
                0 0 40px rgba(255, 42, 133, 0.2);
            letter-spacing: 5px;
        }

        .icon {
            font-size: 3rem;
            margin-top: -20px;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 0 15px var(--neon-pink);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #d1b8c4;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--neon-pink);
            color: #ffffff;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.4);
        }

        .btn-primary:hover {
            background-color: transparent;
            box-shadow: 0 0 25px rgba(255, 42, 133, 0.6);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid var(--text-light);
        }

        .btn-secondary:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #8a6c7c;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Decorative glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: var(--neon-pink);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 250px; height: 250px;
            background: #4a0e2e;
            bottom: -50px; right: -50px;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="container">
        <div class="error-code">404 Error</div>
        <span class="icon">🚀</span>
        <h1>OOPS! We Couldn't Find That Page.</h1>
        <p>It seems the page you are looking for has vanished into the dark pink cosmos. We recommend navigating back to familiar ground.</p>
        <p>If you were using the proxy, please refresh</p>
        
        <div class="buttons">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="#" class="btn btn-secondary">Refresh</a>
        </div>
    </main>

    <footer>
        &copy; 2025 HamCraft UB
    </footer>

</body>
</html>
